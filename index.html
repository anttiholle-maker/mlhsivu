<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MLH Galleria</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        
        h1 {
            text-align: center;
            color: white;
            font-size: 2.5em;
            margin-bottom: 40px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        .galleria {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .kuva {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            transition: transform 0.3s ease;
            cursor: pointer;
        }
        
        .kuva:hover {
            transform: translateY(-10px) scale(1.02);
        }
        
        .kuva img {
            width: 100%;
            height: 220px;
            object-fit: cover;
            display: block;
        }
        
        .kuva p {
            padding: 15px;
            text-align: center;
            color: #333;
            font-weight: 500;
        }
        
        .virhe {
            background: #ffebee;
            color: #c62828;
            padding: 20px;
            text-align: center;
            border-radius: 10px;
            height: 220px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        /* Lightbox-tyylit */
        .lightbox {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            animation: fadeIn 0.3s ease;
        }
        
        .lightbox.active {
            display: flex;
        }
        
        .lightbox img {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
            border-radius: 10px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            animation: zoomIn 0.3s ease;
        }
        
        .lightbox .sulje {
            position: absolute;
            top: 30px;
            right: 40px;
            color: white;
            font-size: 50px;
            cursor: pointer;
            transition: transform 0.2s;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        
        .lightbox .sulje:hover {
            transform: scale(1.2);
        }
        
        .lightbox .edellinen,
        .lightbox .seuraava {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            color: white;
            font-size: 60px;
            cursor: pointer;
            padding: 20px;
            transition: transform 0.2s;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            user-select: none;
        }
        
        .lightbox .edellinen:hover,
        .lightbox .seuraava:hover {
            transform: translateY(-50%) scale(1.2);
        }
        
        .lightbox .edellinen {
            left: 20px;
        }
        
        .lightbox .seuraava {
            right: 20px;
        }
        
        .lightbox .kuvanumero {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-size: 1.2em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        @keyframes zoomIn {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>
    <h1>📸 MLH Galleria</h1>
    
    <div class="galleria" id="galleria"></div>
    
    <!-- Lightbox -->
    <div class="lightbox" id="lightbox">
        <span class="sulje" onclick="suljeLightbox()">&times;</span>
        <span class="edellinen" onclick="vaihdaKuva(-1)">&#10094;</span>
        <img id="lightboxKuva" src="" alt="Suurennettu kuva">
        <span class="seuraava" onclick="vaihdaKuva(1)">&#10095;</span>
        <div class="kuvanumero" id="kuvanumero"></div>
    </div>
    
    <script>
        const githubUser = 'anttiholle-maker';
        const repoName = 'mlhsivu';
        
        const kuvaNimet = [
            'Mlh1.jpeg', 'Mlh2.jpeg', 'Mlh3.jpeg', 'Mlh4.jpeg', 'Mlh5.jpeg',
            'Mlh6.jpeg', 'Mlh7.jpeg', 'Mlh8.jpeg', 'Mlh9.jpeg', 'Mlh10.jpeg',
            'Mlh11.jpeg', 'Mlh12.jpeg', 'Mlh13.jpeg', 'Mlh14.jpeg', 'Mlh15.jpeg',
            'Mlh16.jpeg', 'Mlh17.jpeg', 'Mlh18.jpeg', 'Mlh19.jpeg', 'Mlh20.jpeg',
            'Mlh21.jpeg', 'Mlh22.jpeg', 'Mlh23.jpeg', 'Mlh24.jpeg', 'Mlh25.jpeg',
            'Mlh26.jpeg', 'Mlh27.jpeg', 'Mlh28.jpeg', 'Mlh29.jpeg', 'Mlh30.jpeg',
            'Mlh31.jpeg', 'Mlh32.jpeg', 'Mlh33.jpeg', 'Mlh34.jpeg', 'Mlh35.jpeg',
            'Mlh36.jpeg'
        ];
        
        let nykyinenKuvaIndex = 0;
        
        // Luo galleria
        kuvaNimet.forEach((nimi, index) => {
            const kuvaDiv = document.createElement('div');
            kuvaDiv.className = 'kuva';
            kuvaDiv.onclick = () => avaaLightbox(index);
            
            const kuvaUrl = `https://raw.githubusercontent.com/${githubUser}/${repoName}/main/kuvat/${nimi}`;
            
            kuvaDiv.innerHTML = `
                <img src="${kuvaUrl}" alt="Kuva ${index + 1}" onerror="this.parentElement.innerHTML='<div class=virhe>❌ ${nimi} ei löydy</div>'">
                <p>Kuva ${index + 1}</p>
            `;
            
            document.getElementById('galleria').appendChild(kuvaDiv);
        });
        
        // Lightbox-funktiot
        function avaaLightbox(index) {
            nykyinenKuvaIndex = index;
            paivitaLightbox();
            document.getElementById('lightbox').classList.add('active');
            document.body.style.overflow = 'hidden';
        }
        
        function suljeLightbox() {
            document.getElementById('lightbox').classList.remove('active');
            document.body.style.overflow = 'auto';
        }
        
        function paivitaLightbox() {
            const nimi = kuvaNimet[nykyinenKuvaIndex];
            const kuvaUrl = `https://raw.githubusercontent.com/${githubUser}/${repoName}/main/kuvat/${nimi}`;
            document.getElementById('lightboxKuva').src = kuvaUrl;
            document.getElementById('kuvanumero').textContent = `${nykyinenKuvaIndex + 1} / ${kuvaNimet.length}`;
        }
        
        function vaihdaKuva(suunta) {
            nykyinenKuvaIndex += suunta;
            
            if (nykyinenKuvaIndex < 0) {
                nykyinenKuvaIndex = kuvaNimet.length - 1;
            } else if (nykyinenKuvaIndex >= kuvaNimet.length) {
                nykyinenKuvaIndex = 0;
            }
            
            paivitaLightbox();
        }
        
        // Sulje lightbox ESC-näppäimellä
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') suljeLightbox();
            if (e.key === 'ArrowLeft') vaihdaKuva(-1);
            if (e.key === 'ArrowRight') vaihdaKuva(1);
        });
        
        // Sulje klikkaamalla taustaa
        document.getElementById('lightbox').addEventListener('click', (e) => {
            if (e.target.id === 'lightbox') suljeLightbox();
        });
    </script>
</body>
</html>
