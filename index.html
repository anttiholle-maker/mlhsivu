<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minun Kuvagalleriani</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        
        h1 {
            text-align: center;
            color: white;
            font-size: 2.5em;
            margin-bottom: 40px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        .galleria {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .kuva {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            transition: transform 0.3s ease;
        }
        
        .kuva:hover {
            transform: translateY(-10px);
        }
        
        .kuva img {
            width: 100%;
            height: 220px;
            object-fit: cover;
            display: block;
        }
        
        .kuva p {
            padding: 15px;
            text-align: center;
            color: #333;
            font-weight: 500;
        }
        
        .virhe {
            background: #ffebee;
            color: #c62828;
            padding: 20px;
            text-align: center;
            border-radius: 10px;
            height: 220px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>
    <h1>📸 Minun Kuvagalleriani</h1>
    
    <div class="galleria" id="galleria"></div>
    
    <script>
        const githubUser = 'anttiholle-maker';
        const repoName = 'mlhsivu';
        
        // Luo 36 kuvaa: Mlh1.jpeg - Mlh36.jpeg
        for(let i = 1; i <= 36; i++) {
            const kuvaDiv = document.createElement('div');
            kuvaDiv.className = 'kuva';
            
            // Oikea nimi: Mlh (iso M ja l) + .jpeg
            const kuvaUrl = `https://raw.githubusercontent.com/${githubUser}/${repoName}/main/kuvat/Mlh${i}.jpeg`;
            
            kuvaDiv.innerHTML = `
                <img src="${kuvaUrl}" alt="Kuva ${i}" onerror="this.parentElement.innerHTML='<div class=virhe>❌ Mlh${i}.jpeg ei löydy</div>'">
                <p>Kuva ${i}</p>
            `;
            
            document.getElementById('galleria').appendChild(kuvaDiv);
        }
    </script>
</body>
</html>
