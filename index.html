<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MLH Welho galleria</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        
        h1 {
            text-align: center;
            color: white;
            font-size: 2.5em;
            margin-bottom: 40px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        .galleria {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .kuva {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            transition: transform 0.3s ease;
        }
        
        .kuva:hover {
            transform: translateY(-10px);
        }
        
        .kuva img {
            width: 100%;
            height: 220px;
            object-fit: cover;
            display: block;
        }
        
        .kuva p {
            padding: 15px;
            text-align: center;
            color: #333;
            font-weight: 500;
        }
        
        .virhe {
            background: #ffebee;
            color: #c62828;
            padding: 20px;
            text-align: center;
            border-radius: 10px;
            height: 220px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>
    <h1>📸 MLH Welho galleria</h1>
    
    <div class="galleria" id="galleria"></div>
    
    <script>
        const githubUser = 'anttiholle-maker';
        const repoName = 'mlhsivu';
        
        const kuvaNimet = [
            'Mlh1.jpeg', 'Mlh2.jpeg', 'Mlh3.jpeg', 'Mlh4.jpeg', 'Mlh5.jpeg',
            'Mlh6.jpeg', 'Mlh7.jpeg', 'Mlh8.jpeg', 'Mlh9.jpeg', 'Mlh10.jpeg',
            'Mlh11.jpeg', 'Mlh12.jpeg', 'Mlh13.jpeg', 'Mlh14.jpeg', 'Mlh15.jpeg',
            'Mlh16.jpeg', 'Mlh17.jpeg', 'Mlh18.jpeg', 'Mlh19.jpeg', 'Mlh20.jpeg',
            'Mlh21.jpeg', 'Mlh22.jpeg', 'Mlh23.jpeg', 'Mlh24.jpeg', 'Mlh25.jpeg',
            'Mlh26.jpeg', 'Mlh27.jpeg', 'Mlh28.jpeg', 'Mlh29.jpeg', 'Mlh30.jpeg',
            'Mlh31.jpeg', 'Mlh32.jpeg', 'Mlh33.jpeg', 'Mlh34.jpeg', 'Mlh35.jpeg',
            'Mlh36.jpeg'
        ];
        
        kuvaNimet.forEach((nimi, index) => {
            const kuvaDiv = document.createElement('div');
            kuvaDiv.className = 'kuva';
            
            const kuvaUrl = `https://raw.githubusercontent.com/${githubUser}/${repoName}/main/kuvat/${nimi}`;
            
            kuvaDiv.innerHTML = `
                <img src="${kuvaUrl}" alt="Kuva ${index + 1}" onerror="this.parentElement.innerHTML='<div class=virhe>❌ ${nimi} ei löydy</div>'">
                <p>Kuva ${index + 1}</p>
            `;
            
            document.getElementById('galleria').appendChild(kuvaDiv);
        });
    </script>
</body>
</html>
